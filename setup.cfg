[tool:pytest]
DJANGO_SETTINGS_MODULE = oc_lettings_site.settings
python_files = tests.py
testpaths = src
pythonpath = src
addopts = -v --cov=src --cov-report=term-missing --cov-fail-under=80
filterwarnings =
    ignore::UserWarning:whitenoise
    ignore::UserWarning:sentry_sdk

[coverage:run]
omit =
    */migrations/*
    */venv/*
    src/venv/*
    src/manage.py
    */asgi.py
    */wsgi.py
