[flake8]
max-line-length = 99
exclude = **/migrations/*,venv

[tool:pytest]
DJANGO_SETTINGS_MODULE = oc_lettings_site.settings
python_files = tests.py
addopts = -v --cov=. --cov-report=term-missing --cov-fail-under=80

[coverage:omit]
    */migrations/*
    */venv/*
    manage.py
    */asgi.py
    */wsgi.py
