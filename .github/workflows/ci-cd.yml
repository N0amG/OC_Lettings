name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  # ─────────────────────────────────────────────
  # Job 1 : Compilation, linting et tests
  # Déclenché sur toutes les branches
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Mise en place de Python 3.12.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.10'
          cache: 'pip'

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Linting avec flake8
        run: |
          flake8 .

      - name: Tests et vérification de la couverture (≥ 80 %)
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'False'
          ALLOWED_HOSTS: 'localhost'
        run: |
          pytest --cov=. --cov-report=term-missing --cov-fail-under=80

  # ─────────────────────────────────────────────
  # Job 2 : Construction et push de l'image Docker
  # Déclenché uniquement sur la branche main,
  # après la réussite de build-and-test
  # ─────────────────────────────────────────────
  containerize:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref_name == 'main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraction des métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/oc-lettings-site
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Construction et push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────────
  # Job 3 : Déploiement sur Render
  # Déclenché uniquement après la réussite de containerize
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: containerize
    if: github.event_name == 'push' && github.ref_name == 'main'

    steps:
      - name: Déclencher le redéploiement Render
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
